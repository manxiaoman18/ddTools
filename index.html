<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/tool.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ddTools</title>
    <script>
      (function () {
        var theme = localStorage.getItem('ddtools-theme');
        if (theme === 'dark') {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
    <style>
      :root[data-theme="dark"] { background-color: #18181c; }
      :root:not([data-theme="dark"]) { background-color: #f5f5f5; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
